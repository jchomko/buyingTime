<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Chain SVG Draft Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #0a0a0a;
        color: #f3f3f3;
      }
      .wrap {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }
      .panel {
        border-right: 1px solid #252525;
        padding: 16px;
        display: grid;
        gap: 10px;
        align-content: start;
        background: #111;
      }
      .panel h1 {
        margin: 0 0 8px;
        font-size: 1rem;
        font-weight: 600;
      }
      label {
        display: grid;
        gap: 4px;
        font-size: 0.84rem;
        color: #c9c9c9;
      }
      input, select {
        font: inherit;
        padding: 7px 8px;
        border: 1px solid #313131;
        border-radius: 8px;
        color: #f3f3f3;
        background: #161616;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .row3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      button {
        font: inherit;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #3a3a3a;
        background: #1d1d1d;
        color: #f3f3f3;
        cursor: pointer;
      }
      button:hover {
        background: #262626;
      }
      .meta {
        font-size: 0.78rem;
        color: #9b9b9b;
        line-height: 1.35;
      }
      .stage {
        padding: 16px;
        display: grid;
        place-items: center;
        overflow: auto;
      }
      .frame {
        width: min(86vmin, calc(100vw - 360px));
        aspect-ratio: 1 / 1;
        border: 1px solid #2b2b2b;
        border-radius: 12px;
        background: #000;
        overflow: hidden;
      }
      .frame svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .tiny {
        font-size: 0.75rem;
        color: #8a8a8a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <aside class="panel">
        <h1>On-Chain SVG Draft Preview</h1>

        <label>
          Mode
          <select id="mode">
            <option value="compute">compute</option>
            <option value="precomputed">precomputed</option>
          </select>
        </label>

        <div class="row">
          <label>
            Token ID
            <input id="tokenId" type="number" min="0" value="42" />
          </label>
          <label>
            Minute
            <input id="minute" type="number" min="0" value="517" />
          </label>
        </div>

        <div class="row">
          <label>
            Second
            <input id="second" type="number" min="0" max="59.999" step="0.01" value="27" />
          </label>
          <label>
            Keyframes
            <input id="keyframes" type="number" min="2" max="64" value="12" />
          </label>
        </div>

        <div class="row3">
          <label>
            Cols
            <input id="cols" type="number" min="1" value="24" />
          </label>
          <label>
            Rows
            <input id="rows" type="number" min="1" value="60" />
          </label>
          <label>
            Total
            <input id="total" type="number" min="1" value="1440" />
          </label>
        </div>

        <label>
          Background
          <input id="background" type="text" value="#000000" />
        </label>

        <div class="row">
          <button id="renderBtn">Render</button>
          <button id="playBtn">Play second</button>
        </div>

        <div id="stats" class="meta"></div>
        <div class="tiny">Open at <code>/onchain-draft.html</code></div>
      </aside>

      <main class="stage">
        <div id="frame" class="frame"></div>
      </main>
    </div>

    <script type="module">
      import { buildOnchainStyleMinuteSvg } from './src/render/onchainSvgRendererDraft.js'

      const els = {
        mode: document.getElementById('mode'),
        tokenId: document.getElementById('tokenId'),
        minute: document.getElementById('minute'),
        second: document.getElementById('second'),
        keyframes: document.getElementById('keyframes'),
        cols: document.getElementById('cols'),
        rows: document.getElementById('rows'),
        total: document.getElementById('total'),
        background: document.getElementById('background'),
        renderBtn: document.getElementById('renderBtn'),
        playBtn: document.getElementById('playBtn'),
        frame: document.getElementById('frame'),
        stats: document.getElementById('stats')
      }

      let raf = 0
      let playing = false

      function n(v, fallback = 0) {
        const x = Number(v)
        return Number.isFinite(x) ? x : fallback
      }

      function render() {
        const t0 = performance.now()
        const params = {
          mode: els.mode.value,
          tokenId: n(els.tokenId.value, 42),
          minuteIndex: n(els.minute.value, 0),
          secondInMinute: n(els.second.value, 0),
          keyframeCount: n(els.keyframes.value, 12),
          cols: n(els.cols.value, 24),
          rows: n(els.rows.value, 60),
          totalSquares: n(els.total.value, 1440),
          background: els.background.value || '#000000'
        }
        const svg = buildOnchainStyleMinuteSvg(params)
        els.frame.innerHTML = svg
        const dt = performance.now() - t0
        els.stats.textContent =
          `SVG size: ${svg.length.toLocaleString()} chars | render: ${dt.toFixed(2)}ms`
      }

      function tick() {
        if (!playing) return
        const sec = (n(els.second.value, 0) + 0.1) % 60
        els.second.value = sec.toFixed(2)
        render()
        raf = requestAnimationFrame(tick)
      }

      function setPlaying(next) {
        playing = next
        els.playBtn.textContent = playing ? 'Pause' : 'Play second'
        if (playing) {
          cancelAnimationFrame(raf)
          raf = requestAnimationFrame(tick)
        } else {
          cancelAnimationFrame(raf)
        }
      }

      for (const id of ['mode', 'tokenId', 'minute', 'second', 'keyframes', 'cols', 'rows', 'total', 'background']) {
        els[id].addEventListener('change', render)
      }
      els.renderBtn.addEventListener('click', render)
      els.playBtn.addEventListener('click', () => setPlaying(!playing))

      render()
    </script>
  </body>
</html>
