# Use this when the Amplify app’s repository root is the `mint-site` folder only
# (monorepo "App root" = mint-site, or a repo that contains only mint-site).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
