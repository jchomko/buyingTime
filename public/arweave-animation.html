<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buying Time</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
        cursor: pointer;
      }
      #view-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app" title="Click to cycle token -> grid -> day | keys d/g/t | f fullscreen">
      <canvas id="view-canvas"></canvas>
    </div>

    <script type="module">
      import { mountSingleClock, mountClockGrid } from '/src/render/clockHullMount.js'
      import {
        DEFAULT_SWAP_PARAMS,
        getMinuteIndexFromDate,
        getSecondInMinuteFromDate
      } from '/src/render/clockHullRenderer.js'
      import { TOTAL_SQUARES, normalizeMinuteIndex, resolveGridDims } from '/src/timeGrid.js'

      const MODES = ['token', 'grid', 'day']

      const params = new URLSearchParams(window.location.search)
      const tokenIdRaw = Number(params.get('tokenId') ?? 0)
      const tokenId = Number.isFinite(tokenIdRaw) ? Math.max(0, Math.floor(tokenIdRaw)) : 0
      const selectedMinute = normalizeMinuteIndex(tokenId % TOTAL_SQUARES)

      const canvas = document.getElementById('view-canvas')
      const app = document.getElementById('app')

      const dimsRef = { current: resolveGridDims(window.innerWidth, window.innerHeight) }
      const updateDims = () => {
        dimsRef.current = resolveGridDims(window.innerWidth, window.innerHeight)
      }
      window.addEventListener('resize', updateDims)

      const swapParams = {
        ...DEFAULT_SWAP_PARAMS,
        mode: 'y-wave',
        wRip: true
      }

      let modeIndex = 0
      let handle = null

      function disposeHandle() {
        if (handle) {
          handle.dispose()
          handle = null
        }
      }

      function currentMode() {
        return MODES[modeIndex]
      }

      function mountForMode(mode) {
        disposeHandle()
        if (mode === 'token') {
          handle = mountSingleClock(canvas, {
            getMinuteIndex: () => selectedMinute,
            getSecondInMinute: () => getSecondInMinuteFromDate(new Date()),
            getGridRow: () => Math.floor(selectedMinute / dimsRef.current.cols),
            gridRowCount: () => dimsRef.current.rows,
            swapParams,
            targetFps: 60
          })
        } else if (mode === 'grid') {
          handle = mountClockGrid(canvas, {
            getGridDims: (w, h) => resolveGridDims(Math.max(1, w), Math.max(1, h)),
            getSecondInMinute: () => getSecondInMinuteFromDate(new Date()),
            getActiveIndex: () => getMinuteIndexFromDate(new Date(), TOTAL_SQUARES),
            swapParams,
            targetFps: 30
          })
        } else if (mode === 'day') {
          handle = mountSingleClock(canvas, {
            getMinuteIndex: () => getMinuteIndexFromDate(new Date(), TOTAL_SQUARES),
            getSecondInMinute: () => getSecondInMinuteFromDate(new Date()),
            getGridRow: () =>
              Math.floor(
                getMinuteIndexFromDate(new Date(), TOTAL_SQUARES) / dimsRef.current.cols
              ),
            gridRowCount: () => dimsRef.current.rows,
            swapParams,
            targetFps: 60
          })
        }
      }

      function setModeByName(name) {
        const i = MODES.indexOf(name)
        if (i >= 0) {
          modeIndex = i
          mountForMode(currentMode())
        }
      }

      function cycleMode() {
        modeIndex = (modeIndex + 1) % MODES.length
        mountForMode(currentMode())
      }

      mountForMode(currentMode())

      app.addEventListener('click', (e) => {
        if (e.target === canvas || e.target === app) {
          cycleMode()
        }
      })

      window.addEventListener('keydown', (e) => {
        if (e.repeat) return
        const k = e.key.toLowerCase()
        if (k === 'f') {
          e.preventDefault()
          if (!document.fullscreenElement) {
            app.requestFullscreen().catch(() => {})
          } else {
            document.exitFullscreen().catch(() => {})
          }
          return
        }
        if (k === 'd') {
          e.preventDefault()
          setModeByName('day')
          return
        }
        if (k === 'g') {
          e.preventDefault()
          setModeByName('grid')
          return
        }
        if (k === 't') {
          e.preventDefault()
          setModeByName('token')
          return
        }
      })

      window.addEventListener('beforeunload', () => {
        disposeHandle()
      })
    </script>
  </body>
</html>
