<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>Buying Time Embed Preview</title><style>body,html{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}#app{position:fixed;inset:0}#preview-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.overlay{position:absolute;left:.75rem;bottom:.75rem;z-index:2;font-size:12px;letter-spacing:.04em;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:.4rem .55rem;line-height:1.35}</style></head><body><div id="app"><canvas id="preview-canvas"></canvas><div id="meta" class="overlay"></div></div><script type="module">import{mountSingleClock}from"/src/render/clockHullMount.js";import{DEFAULT_SWAP_PARAMS,getSecondInMinuteFromDate}from"/src/render/clockHullRenderer.js";import{TOTAL_SQUARES,normalizeMinuteIndex,resolveGridDims}from"/src/timeGrid.js";const params=new URLSearchParams(window.location.search),tokenIdRaw=Number(params.get("tokenId")??0),tokenId=Number.isFinite(tokenIdRaw)?Math.max(0,Math.floor(tokenIdRaw)):0,selectedMinute=normalizeMinuteIndex(tokenId%TOTAL_SQUARES),canvas=document.getElementById("preview-canvas"),meta=document.getElementById("meta"),dimsRef={current:resolveGridDims(window.innerWidth,window.innerHeight)},updateDims=()=>{dimsRef.current=resolveGridDims(window.innerWidth,window.innerHeight)};updateDims(),window.addEventListener("resize",updateDims);const swapParams={...DEFAULT_SWAP_PARAMS,mode:"y-wave",swapBehavior:"swap",waveRippleEnabled:!0,chromaticNudgeSource:"manual",innerSpatialChromaticGradient:!1,innerSpatialChromaticChasePerMinute:0,innerAreaLuminanceMod:!1,innerHandProximityLightness:!1};meta.textContent=`tokenId ${tokenId}  minute ${selectedMinute}`;const handle=mountSingleClock(canvas,{getMinuteIndex:()=>selectedMinute,getSecondInMinute:()=>getSecondInMinuteFromDate(new D
