<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buying Time — Grid (local time)</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #grid-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="grid-canvas"></canvas>
    </div>

    <script type="module">
      import { mountClockGrid } from '/src/render/clockHullMount.js'
      import {
        DEFAULT_SWAP_PARAMS,
        getMinuteIndexFromDate,
        getSecondInMinuteFromDate
      } from '/src/render/clockHullRenderer.js'
      import { TOTAL_SQUARES, resolveGridDims } from '/src/timeGrid.js'

      const canvas = document.getElementById('grid-canvas')

      const dimsRef = { current: resolveGridDims(window.innerWidth, window.innerHeight) }
      const updateDims = () => {
        dimsRef.current = resolveGridDims(window.innerWidth, window.innerHeight)
      }
      updateDims()
      window.addEventListener('resize', updateDims)

      const swapParams = {
        ...DEFAULT_SWAP_PARAMS,
        mode: 'y-wave',
        wRip: true
      }

      const handle = mountClockGrid(canvas, {
        getGridDims: (w, h) => resolveGridDims(Math.max(1, w), Math.max(1, h)),
        getSecondInMinute: () => getSecondInMinuteFromDate(new Date()),
        getActiveIndex: () => getMinuteIndexFromDate(new Date(), TOTAL_SQUARES),
        swapParams,
        targetFps: 30
      })

      window.addEventListener('beforeunload', () => {
        handle.dispose()
      })
    </script>
  </body>
</html>
