<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buying Time</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #preview-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="preview-canvas"></canvas>
    </div>

    <script type="module">
      import { mountSingleClock } from '/src/render/clockHullMount.js'
      import {
        DEFAULT_SWAP_PARAMS,
        getMinuteIndexFromDate,
        getSecondInMinuteFromDate
      } from '/src/render/clockHullRenderer.js'
      import { TOTAL_SQUARES, resolveGridDims } from '/src/timeGrid.js'

      const canvas = document.getElementById('preview-canvas')

      const dimsRef = { current: resolveGridDims(window.innerWidth, window.innerHeight) }
      const updateDims = () => {
        dimsRef.current = resolveGridDims(window.innerWidth, window.innerHeight)
      }
      updateDims()
      window.addEventListener('resize', updateDims)

      const swapParams = {
        ...DEFAULT_SWAP_PARAMS,
        mode: 'y-wave',
        wRip: true
      }

      const handle = mountSingleClock(canvas, {
        getMinuteIndex: () => getMinuteIndexFromDate(new Date(), TOTAL_SQUARES),
        getSecondInMinute: () => getSecondInMinuteFromDate(new Date()),
        getGridRow: () =>
          Math.floor(getMinuteIndexFromDate(new Date(), TOTAL_SQUARES) / dimsRef.current.cols),
        gridRowCount: () => dimsRef.current.rows,
        swapParams,
        targetFps: 60
      })

      window.addEventListener('beforeunload', () => {
        handle.dispose()
      })
    </script>
  </body>
</html>
