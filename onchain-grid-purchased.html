<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Chain Purchased Grid View</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; background: #0b0b0b; color: #f3f3f3; }
      .wrap { min-height: 100vh; display: grid; grid-template-columns: 420px 1fr; }
      .panel { padding: 16px; border-right: 1px solid #282828; background: #121212; display: grid; gap: 10px; align-content: start; }
      h1 { margin: 0 0 8px; font-size: 1rem; }
      label { display: grid; gap: 4px; font-size: 0.84rem; color: #cbcbcb; }
      input, select, textarea, button { font: inherit; }
      input, select, textarea { padding: 7px 8px; border-radius: 8px; border: 1px solid #343434; background: #191919; color: #f3f3f3; }
      textarea { min-height: 96px; resize: vertical; }
      button { padding: 8px 10px; border-radius: 8px; border: 1px solid #3a3a3a; background: #1f1f1f; color: #f3f3f3; cursor: pointer; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .stage { display: grid; place-items: center; padding: 16px; }
      .frame { width: min(90vmin, calc(100vw - 460px)); aspect-ratio: 1/1; border: 1px solid #2c2c2c; border-radius: 12px; background: #000; overflow: hidden; }
      .frame svg { width: 100%; height: 100%; display: block; }
      .meta { font-size: 0.78rem; color: #9d9d9d; line-height: 1.4; }
      .check { display: flex; align-items: center; gap: 8px; }
      .check input { width: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <aside class="panel">
        <h1>Purchased Tokens Grid View</h1>

        <div class="row">
          <label>Minute Index <input id="minute" type="number" min="0" value="517" /></label>
          <label>Second <input id="second" type="number" min="0" max="59.999" step="0.01" value="27" /></label>
        </div>

        <div class="row3">
          <label>Cols <input id="cols" type="number" min="1" value="24" /></label>
          <label>Rows <input id="rows" type="number" min="1" value="60" /></label>
          <label>Total <input id="total" type="number" min="1" value="1440" /></label>
        </div>

        <label class="check"><input id="useNow" type="checkbox" checked /> Use live second</label>

        <div class="row">
          <label class="check"><input id="showMissing" type="checkbox" checked /> Show missing slots</label>
          <label>Missing opacity <input id="missingOpacity" type="number" min="0" max="1" step="0.01" value="0.08" /></label>
        </div>

        <label>
          Purchased Token IDs (comma/space-separated)
          <textarea id="purchasedIds">0, 1, 2, 10, 40, 122, 517, 900, 1200</textarea>
        </label>

        <div class="row">
          <label>Sold count <input id="soldCount" type="number" min="0" value="360" /></label>
          <button id="randomizeBtn">Randomize unsold</button>
        </div>

        <label>RPC URL <input id="rpcUrl" type="text" placeholder="https://mainnet.infura.io/v3/..." /></label>
        <label>Contract Address <input id="contractAddress" type="text" placeholder="0x..." /></label>
        <label>
          Fetch strategy
          <select id="fetchStrategy">
            <option value="auto">auto (list methods, then enumerable)</option>
            <option value="list-only">list-only</option>
            <option value="enumerable-only">enumerable-only</option>
          </select>
        </label>

        <div class="row">
          <button id="fetchBtn">Fetch purchased from contract</button>
          <button id="renderBtn">Render</button>
        </div>
        <button id="playBtn">Play second</button>

        <div id="status" class="meta"></div>
        <div id="stats" class="meta"></div>
      </aside>
      <main class="stage"><canvas id="frame" class="frame"></canvas></main>
    </div>

    <script type="module">
      import { initPurchasedGridPage } from './src/render/onchainViewPages.js'
      initPurchasedGridPage()
    </script>
  </body>
</html>
